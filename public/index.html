<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <title>YT Downloader</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <h1>YouTube Video Downloader (Demo)</h1>
      <form id="downloadForm">
        <input
          type="text"
          id="videoUrl"
          name="videoUrl"
          placeholder="YouTube-URL eingeben"
          required
        />
        <button type="submit">Download</button>
      </form>
      <p id="status"></p>
    </div>

    <script src="script.js"></script>
  </body>
</html>
